seed: 123
amp: false
device: cuda
model:
  feature_channels: 1
  pretrained_backbone: true
  consensus_radius: 1.0
  consensus_temperature: 0.25
  consensus_max_candidates: 5
data:
  train_video_dir: dataset/train
  crop_h: 315
  crop_w: 560
  img_h: 360
  img_w: 640
  rho: 16
  temporal_gap_min: 1
  temporal_gap_max: 3
  pairs_per_epoch: 12000
  # Increase if memory allows. With 3 temporal forwards, 8 is safer than 32.
  batch_size: 8
  num_workers: 4
  deterministic_sampling: false
  val_npy_dir: dataset/val_labels
  val_image_root: dataset/val_images
  eval_crop_x: 40
  eval_crop_y: 23
  eval_max_points: 6
train:
  out_dir: runs/v3_dominant_temporal_support
  total_iters: 120000
  # Accuracy-first staged schedule. Stage 1 is intentionally V1-like.
  stage1_iters: 60000
  stage2_iters: 90000
  stage3_iters: 110000
  lr: 0.0001
  stage2_lr: 0.000064
  stage2_lr_mode: min
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-8
  amsgrad: true
  weight_decay: 0.0001
  lr_decay_every: 12000
  lr_decay_gamma: 0.8
  log_every: 100
  save_every: 2000
  val_every: 2000
  clip_grad_norm: 10.0
  data_parallel: false
  use_temporal_triplets: true
loss:
  triplet_margin: 1.0
  min_support: 0.15
  # These are overwritten by the trainer stage schedule; kept for documentation.
  weights:
    triplet: 1.0
    init_triplet: 0.0
    support: 0.0
    uncertainty: 0.0
    consensus: 0.0
    temporal_cycle: 0.0
    point: 0.0
